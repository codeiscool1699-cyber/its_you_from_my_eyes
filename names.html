<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Name Cards</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            margin: 0;
            overflow-x: hidden;
        }

        .mobile-only {
            max-width: 480px;
            margin: 0 auto;
        }

        .desktop-message {
            display: none;
        }

        .page-title{
            text-align: center;
            background-color: white;
            padding-top: 20px;
            color: #ff6b6b;
        }

        @media (min-width: 769px) {
            .mobile-only {
                display: none;
            }

            .desktop-message {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100vh;
                text-align: center;
                padding: 20px;
            }

            .desktop-message h1 {
                font-size: 32px;
                color: #333;
                margin-bottom: 15px;
                font-weight: 600;
            }

            .desktop-message p {
                font-size: 18px;
                color: #666;
                margin: 0;
            }
        }

        /* Name Card Styles */
        .name-card-container {
            padding: 20px;
            background: white;
            min-height: 100vh;
        }

        .name-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            cursor: pointer;
            transition: transform 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .name-card:active {
            transform: scale(0.98);
        }

        .name-card-image-wrapper {
            width: 100%;
            height: 200px;
            background: #d3d3d3;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .name-card-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: block;
        }

        .name-card-content {
            padding: 20px;
        }

        .name-card-title {
            font-size: 24px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .name-card-description {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="desktop-message">
        <h1>Please open in mobile to view this page</h1>
        <p>This page is optimized for mobile devices only.</p>
    </div>

    <div class="mobile-only">
        <!-- Name Cards Section -->
        <h1 class="page-title">101 name of you</h1>
        <div class="name-card-container" id="nameCardContainer">
            <!-- Name cards will be populated by JavaScript -->
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/libgif@0.0.3/libgif.min.js"></script>
    <script>
        // Name cards data
        const nameCardsData = [
            {
                name: "AngryBird",
                description: "Angry as always.",
                image: "./assets/name-images/angry-angry-bird.gif"
            },
            {
                name: "Miss Smarty",
                description: "Smart and intelligent.",
                image: "./assets/name-images/smart-girl.gif"
            },
            {
                name: "Bookworm",
                description: "Studious and love books",
                image: "./assets/name-images/studious-girl.gif"
            },
            {
                name: "Jhasi ki Rani",
                description: "Loves sword",
                image: "./assets/name-images/sword-girl.gif"
            },
            {
                name: "Mini Blast",
                description: "Curious about guns and explosive",
                image: "./assets/name-images/gun-girl.gif"
            },
            {
                name: "My Penguin",
                description: "My penguin",
                image: "..."
            },
            {
                name: "My dear, teddy bear",
                description: "The teddy i'll cuddel the most",
                image: "..."
            }
        ];

        // Global state to track all GIF controllers
        const gifControllers = [];

        function renderNameCards() {
            const container = document.getElementById('nameCardContainer');
            container.innerHTML = '';

            nameCardsData.forEach((card, index) => {
                const nameCard = document.createElement('div');
                nameCard.className = 'name-card';
                nameCard.setAttribute('data-index', index);
                
                nameCard.innerHTML = `
                    <div class="name-card-image-wrapper" id="wrapper-${index}">
                        <img src="${card.image}" 
                             class="name-card-image" 
                             id="gif-${index}"
                             rel:animated_src="${card.image}"
                             rel:auto_play="0"
                             style="display: none;">
                    </div>
                    <div class="name-card-content">
                        <div class="name-card-title">${card.name}</div>
                        <div class="name-card-description">${card.description}</div>
                    </div>
                `;
                
                container.appendChild(nameCard);
            });

            // Initialize GIF controls after cards are rendered
            setTimeout(() => {
                nameCardsData.forEach((card, index) => {
                    setupGifControl(index);
                });
            }, 100);
        }

        function stopAllOtherGifs(currentIndex) {
            gifControllers.forEach((controller, index) => {
                if (index !== currentIndex && controller.isPlaying) {
                    controller.pause();
                }
            });
        }

        function setupGifControl(index) {
            const img = document.getElementById(`gif-${index}`);
            const wrapper = document.getElementById(`wrapper-${index}`);
            const card = document.querySelector(`[data-index="${index}"]`);
            
            let sup = null;

            // Controller object to manage this GIF
            const controller = {
                isPlaying: false,
                sup: null,
                play: function() {
                    if (this.sup) {
                        this.sup.play();
                        this.isPlaying = true;
                    }
                },
                pause: function() {
                    if (this.sup) {
                        this.sup.pause();
                        this.isPlaying = false;
                    }
                }
            };

            gifControllers[index] = controller;

            // Initialize SuperGif
            try {
                sup = new SuperGif({
                    gif: img,
                    auto_play: false,
                    show_progress_bar: false,
                    max_width: wrapper.clientWidth,
                    on_end: function() {
                        // Optional: handle when GIF ends
                    }
                });
                
                sup.load(function() {
                    controller.sup = sup;
                    
                    // Get the canvas element created by SuperGif
                    const canvas = sup.get_canvas();
                    
                    if (canvas) {
                        // Get original dimensions
                        const originalWidth = canvas.width;
                        const originalHeight = canvas.height;
                        
                        // Container dimensions
                        const containerWidth = wrapper.clientWidth;
                        const containerHeight = 200;
                        
                        // Calculate scaled dimensions to fit container while maintaining aspect ratio
                        let scaledWidth = originalWidth;
                        let scaledHeight = originalHeight;
                        
                        const widthRatio = containerWidth / originalWidth;
                        const heightRatio = containerHeight / originalHeight;
                        const scale = Math.min(widthRatio, heightRatio);
                        
                        scaledWidth = originalWidth * scale;
                        scaledHeight = originalHeight * scale;
                        
                        // Apply the scaled dimensions to canvas
                        canvas.style.width = scaledWidth + 'px';
                        canvas.style.height = scaledHeight + 'px';
                        canvas.style.maxWidth = '100%';
                        canvas.style.maxHeight = '100%';
                        canvas.style.objectFit = 'contain';
                        canvas.style.display = 'block';
                    }
                    
                    // Keep it paused initially
                    sup.pause();
                });
            } catch (e) {
                console.log('SuperGif error:', e);
            }

            // Click and touch handler
            const handleInteraction = function(e) {
                e.preventDefault();
                e.stopPropagation();
                
                if (!controller.isPlaying) {
                    // Stop all other GIFs before playing this one
                    stopAllOtherGifs(index);
                    controller.play();
                } else {
                    controller.pause();
                }
            };

            // Add both click and touchstart event listeners for mobile compatibility
            card.addEventListener('click', handleInteraction);
            card.addEventListener('touchstart', handleInteraction, { passive: false });
        }

        // Initialize name cards
        renderNameCards();
    </script>
</body>
</html>
